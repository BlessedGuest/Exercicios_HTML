<body>

    <h2>Análise de cadastro</h2>
    <p>Cadastre-se para receber as nossas promoções!</p>
    <fieldset>
        <legend><b>Dados pessoais</b></legend>
    <form action="#" method="post">
        <label>Nome completo</label>
        <input type="text" minlength="4" required="yes">
        <label>Data de nascimento</label>
        <input type="date" required="yes">
        <label>Telefone</label>
        <input type="tel" required="yes">
    </form>
    </fieldset>
</body>
