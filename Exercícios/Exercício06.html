<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06</title>
</head>
<body>
    <header>
    <h1>Lipsum Cafeteria</h1>
    <img src="../Imagens/logoipsum.png" width="10%">
    <p>Desde 1997 preparando as melhores refeições para seu café.</p>
    <br>
    </header>
    <hr>
    <br>
    <main>
    <h2>Análise de cadastro</h2>
    <p>Cadastre-se para receber as nossas promoções!</p>
    <form action="#" method="post">
    <section>
    <fieldset>
        <legend><b>Dados pessoais</b></legend>
        <label>Nome completo</label>
        <input type="text" minlength="4" required="yes" placeholder="Digite seu nome">
        <label>Data de nascimento</label>
        <input type="date" required="yes" max="2011-01-01" min="1900-01-01">
        <label>Telefone</label>
        <input type="number" type="tel" required="yes" minlength="11" maxlength="11" placeholder="(XX) XXXXX-XXXX">
    </fieldset>
    </section>
    <section>
        <fieldset>
            <legend style="font-size:50px"><b>E-mail</b></legend>
            <label>Assine o cadastro com seu e-mail: </label>
            <input type="email" required="yes" placeholder="xxxxxx@xxx.com">
        </fieldset>
    </section>
    <br>
    <section>
        <fieldset>
            <legend><b>Escolha seu brinde de cadastro!</b></legend>
            <label>Escolha um alimento e uma bebida.</label>
            <select name="brinde" placeholder="Escolha seu brinde!">
                <optgroup label="alimentos">
                    <option value="snatural">Mini sanduíche natural</option>
                    <option>3 mini pães de queijo</option>
                </optgroup>
            </select>
            <select>
                <optgroup label="Bebidas">
                    <option value="cappuccino">Cappuccino 50ml</option>
                    <option value="Café">Café expresso 70ml</option>
                </optgroup>
            </select>
        </fieldset>
    </section>
    <br>
    <div align="right">
    <button type="submit">Enviar</button>
    </div>
</form>
    </main>
</body>
</html>
